{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="max-width: 400px; margin: 40px auto;">
    <h2 style="text-align: center; color: var(--text-main);">Reset Password</h2>
    <p style="text-align: center; font-size: 0.9rem; color: var(--text-sub); margin-bottom: 25px;">
        Verify your identity to proceed.
    </p>
    
    <form method="POST">
        <div class="form-group">
            <input type="email" name="email" placeholder="Registered Email" required>
        </div>
        <div class="form-group">
            <label style="font-size: 0.85rem; color: var(--text-sub);">Date of Birth</label>
            <input type="date" name="dob" required>
        </div>
        <div class="form-group">
            <input type="password" name="new_password" placeholder="New Password" required>
        </div>
        <button class="btn-gradient" type="submit" style="width: 100%;">Reset Password</button>
    </form>
</div>
{% endblock %}
