<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <style>
        /* --- COPYING CORE THEME FOR CONSISTENCY --- */
        :root {
            --bg-body: #f0f4f8;
            --text-main: #0f172a;
            --text-sub: #334155;
            --primary: #2563eb;
            --accent: #3b82f6;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.4);
            --gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            z-index: -1;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.6;
        }
        body::before { top: -100px; left: -100px; width: 500px; height: 500px; background: rgba(37, 99, 235, 0.3); }
        body::after { bottom: -100px; right: -100px; width: 500px; height: 500px; background: rgba(124, 58, 237, 0.3); }

        /* Maintenance Card */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            backdrop-filter: blur(16px);
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: floatUp 0.8s ease-out;
        }

        @keyframes floatUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Animated Icon */
        .icon-container {
            font-size: 4rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { 
            margin: 0 0 10px 0; 
            font-size: 2rem; 
            background: var(--gradient); 
            -webkit-background-clip: text; 
            background-clip: text; /* FIXED: Added standard property */
            -webkit-text-fill-color: transparent; 
        }
        
        p.message { font-size: 1.1rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 30px; }
        
        .status-box {
            background: rgba(255,255,255,0.5); border: 1px solid var(--card-border);
            padding: 15px; border-radius: 12px; margin-bottom: 25px;
            font-size: 0.9rem; color: var(--text-sub);
        }

        .btn-retry {
            background: var(--gradient); color: white; border: none;
            padding: 12px 30px; border-radius: 50px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none; display: inline-block;
        }
        .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
        .btn-retry:active { transform: translateY(0); }

    </style>
</head>
<body>

    <div class="glass-card">
        <div class="icon-container">🚧</div>
        <h1>System Maintenance</h1>
        
        <p class="message">
            {{ message if message else "We are currently upgrading our servers to improve performance. Please check back shortly." }}
        </p>

        <div class="status-box">
            <span style="display:block; font-weight:bold; margin-bottom:5px;">Expected Duration:</span>
            <span>Until updates are complete</span>
        </div>

        <button onclick="window.location.reload()" class="btn-retry">
            ↻ Check Status
        </button>
        
        <p style="margin-top: 20px; font-size: 0.85rem; opacity: 0.7;">
            Auto-refreshing in <span id="timer">30</span>s
        </p>
    </div>

    <script>
        // Dynamic Countdown Timer
        let count = 30;
        const timerElement = document.getElementById('timer');
        
        setInterval(() => {
            count--;
            if (count >= 0) {
                timerElement.innerText = count;
            } else {
                window.location.reload();
            }
        }, 1000);
    </script>

</body>
</html>
