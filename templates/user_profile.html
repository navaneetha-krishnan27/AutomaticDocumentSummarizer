{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <div style="width: 80px; height: 80px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; margin: 0 auto 20px;">
        👤
    </div>
    <h2 style="margin-bottom: 30px;">User Profile</h2>
    
    <div style="text-align: left; background: var(--input-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--card-border);">
        <div style="margin-bottom: 15px;">
            <label style="color: var(--text-sub); font-size: 0.85rem;">Username</label>
            <div style="font-size: 1.1rem; font-weight: bold;">{{ current_user.username }}</div>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="color: var(--text-sub); font-size: 0.85rem;">Email</label>
            <div style="font-size: 1.1rem; font-weight: bold;">{{ current_user.email }}</div>
        </div>
        <div>
            <label style="color: var(--text-sub); font-size: 0.85rem;">Date of Birth</label>
            <div style="font-size: 1.1rem; font-weight: bold;">{{ current_user.dob }}</div>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <a href="{{ url_for('dashboard') }}" class="btn-gradient">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
