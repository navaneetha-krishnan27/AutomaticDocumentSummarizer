{% extends "base.html" %}

{% block content %}
<style>
    /* --- LAYOUT & THEME --- */
    :root {
        --upload-area-bg: rgba(245, 158, 11, 0.05);
        --upload-border: #f59e0b;
        --sidebar-bg: #fff;
    }
    
    body.dark-mode {
        --upload-area-bg: rgba(245, 158, 11, 0.1);
        --sidebar-bg: #1e293b;
    }

    .tool-wrapper {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        max-width: 1200px;
        margin: 40px auto;
        align-items: flex-start;
    }

    /* Info & Limitations Box */
    .info-box {
        background: var(--input-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 15px 20px;
        margin-bottom: 25px;
        font-size: 0.9rem;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        justify-content: space-between;
    }

    .badge-offline {
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
        padding: 5px 12px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .limit-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        gap: 20px;
        color: var(--text-sub);
        font-size: 0.85rem;
        flex-wrap: wrap;
    }
    .limit-list li { display: flex; align-items: center; gap: 6px; }
    .limit-list li::before { content: "•"; color: var(--text-sub); }

    /* --- LEFT: IMAGE GRID --- */
    .main-area {
        flex: 1;
        min-width: 300px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 30px;
        box-shadow: var(--shadow);
    }

    .upload-area-initial {
        border: 2px dashed var(--card-border);
        border-radius: 16px;
        padding: 50px;
        text-align: center;
        background: var(--upload-area-bg);
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .upload-area-initial:hover {
        border-color: var(--upload-border);
        transform: translateY(-2px);
    }

    #image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 15px;
        margin-top: 20px;
    }

    .image-card {
        background: var(--input-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        aspect-ratio: 1;
        animation: popIn 0.3s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .image-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Remove Button */
    .remove-btn {
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(239, 68, 68, 0.9);
        color: white;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.2s;
    }
    .image-card:hover .remove-btn { opacity: 1; }

    /* Add More Card */
    .add-more-card {
        border: 2px dashed var(--card-border);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--upload-border);
        aspect-ratio: 1;
        transition: all 0.2s;
    }
    .add-more-card:hover {
        background: var(--upload-area-bg);
        border-color: var(--upload-border);
    }

    /* --- RIGHT: SIDEBAR --- */
    .sidebar {
        width: 300px;
        background: var(--sidebar-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 25px;
        box-shadow: var(--shadow);
        position: sticky;
        top: 100px;
    }

    .sidebar h3 { margin-top: 0; color: var(--text-main); }
    
    .setting-group { margin-bottom: 20px; }
    .setting-label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-sub); font-size: 0.9rem; }
    
    .styled-select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--input-bg);
        color: var(--text-main);
    }

    .radio-group {
        display: flex;
        background: var(--input-bg);
        padding: 4px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
    }
    .radio-option {
        flex: 1;
        text-align: center;
        padding: 8px;
        cursor: pointer;
        border-radius: 6px;
        font-size: 0.9rem;
        transition: all 0.2s;
    }
    .radio-option.active {
        background: var(--upload-border);
        color: white;
        font-weight: bold;
    }
    .radio-option input { display: none; }

    /* Buttons */
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    
    .btn-convert, .btn-preview {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
        opacity: 0.5;
        pointer-events: none;
    }
    
    .btn-convert { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .btn-preview { background: var(--primary); }
    
    .btn-convert.ready, .btn-preview.ready { opacity: 1; pointer-events: all; }
    .btn-convert:hover, .btn-preview:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

    /* --- PREVIEW MODAL --- */
    /* Ensure opacity 1 override so it shows */
    #preview-modal.modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 2000;
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
        opacity: 1 !important; 
        pointer-events: auto !important;
    }
    
    .modal-content {
        background: var(--card-bg);
        width: 90%;
        height: 90%;
        max-width: 1000px;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    
    .modal-header {
        padding: 15px 20px;
        background: var(--nav-glass);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--card-border);
    }
    
    .modal-close {
        background: transparent;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: var(--text-main);
    }
    
    iframe {
        flex: 1;
        border: none;
        width: 100%;
        height: 100%;
        background: #eee;
        opacity: 1 !important; 
    }

    /* Status Message */
    #status-container {
        margin-top: 15px;
        text-align: center;
        display: none;
        padding: 10px;
        border-radius: 8px;
        font-size: 0.9rem;
    }
    .status-success {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        border: 1px solid #10b981;
    }
    .status-error {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
        border: 1px solid var(--danger);
    }

    @keyframes popIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }
</style>

<div class="tool-wrapper">
    
    <div class="main-area">
        <h2 style="margin-top:0; margin-bottom:5px; color: var(--text-main);">🖼️ JPG to PDF</h2>
        <p style="color: var(--text-sub); margin-bottom: 25px;">Convert and merge images into a PDF file.</p>

        <div class="info-box">
            <div class="badge-offline">⚡ 100% Free & Offline</div>
            <ul class="limit-list">
                <li>Max <strong>30 Images</strong></li>
                <li>Max <strong>10MB/Img</strong></li>
                <li>Standard Format</li>
            </ul>
        </div>

        <div id="initial-upload" class="upload-area-initial" onclick="triggerUpload()">
            <p style="font-size: 3rem; margin: 0 0 15px 0;">📷</p>
            <p style="font-size: 1.2rem; font-weight: 500; margin: 0; color: var(--text-main);">Select Images</p>
            <p style="color: var(--text-sub); font-size: 0.9rem;">or drop JPG, PNG, WEBP here</p>
        </div>

        <div id="image-grid" style="display: none;">
            <div class="add-more-card" onclick="triggerUpload()">
                <span style="font-size: 24px; font-weight: bold;">+</span>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <h3>PDF Options</h3>
        
        <form id="convertForm" action="{{ url_for('img_to_pdf_tool') }}" method="POST" enctype="multipart/form-data">
            <input type="file" id="fileInput" name="files" accept="image/*" multiple style="display: none;" onchange="addFiles(this)">

            <div class="setting-group">
                <label class="setting-label">Page Size</label>
                <select name="page_size" class="styled-select" onchange="toggleOrientation(this.value)">
                    <option value="original">Fit (Same as Image)</option>
                    <option value="a4" selected>A4</option>
                    <option value="letter">US Letter</option>
                </select>
            </div>

            <div class="setting-group" id="orientation-group">
                <label class="setting-label">Orientation</label>
                <div class="radio-group">
                    <label class="radio-option active" onclick="setOrientation(this, 'portrait')">
                        Portrait
                        <input type="radio" name="orientation" value="portrait" checked>
                    </label>
                    <label class="radio-option" onclick="setOrientation(this, 'landscape')">
                        Landscape
                        <input type="radio" name="orientation" value="landscape">
                    </label>
                </div>
            </div>

            <div class="setting-group">
                <label class="setting-label">Margin</label>
                <select name="margin" class="styled-select">
                    <option value="none" selected>No Margin</option>
                    <option value="small">Small</option>
                    <option value="big">Big</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="button" id="previewBtn" class="btn-preview" onclick="openPreview()">Preview</button>
                <button type="submit" id="convertBtn" class="btn-convert">Download</button>
            </div>
            
            <div id="status-container"></div>
        </form>
    </div>
</div>

<div id="preview-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0;">PDF Preview</h3>
            <button class="modal-close" onclick="closePreview()">×</button>
        </div>
        <div style="flex:1; position:relative;">
            <div id="loading-spinner" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:var(--text-sub);">
                ⏳ Generating Preview...
            </div>
            <iframe id="pdf-preview-frame"></iframe>
        </div>
    </div>
</div>

<script>
    let allFiles = []; // Master list of files

    function triggerUpload() {
        document.getElementById('fileInput').click();
    }

    function addFiles(input) {
        document.getElementById('status-container').style.display = 'none';

        if (input.files && input.files.length > 0) {
            Array.from(input.files).forEach(file => {
                allFiles.push(file);
            });
            renderGrid();
        }
        input.value = ''; 
    }

    function removeFile(index) {
        allFiles.splice(index, 1);
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('image-grid');
        const initial = document.getElementById('initial-upload');
        const btnC = document.getElementById('convertBtn');
        const btnP = document.getElementById('previewBtn');
        const addCard = grid.querySelector('.add-more-card');

        // Clear existing images
        const existingCards = grid.querySelectorAll('.image-card');
        existingCards.forEach(card => card.remove());

        if (allFiles.length > 0) {
            initial.style.display = 'none';
            grid.style.display = 'grid';
            btnC.classList.add('ready');
            btnP.classList.add('ready');

            allFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <img src="${e.target.result}" alt="img">
                        <button type="button" class="remove-btn" onclick="removeFile(${index})">×</button>
                    `;
                    grid.insertBefore(card, addCard);
                }
                reader.readAsDataURL(file);
            });
        } else {
            initial.style.display = 'block';
            grid.style.display = 'none';
            btnC.classList.remove('ready');
            btnP.classList.remove('ready');
        }
    }

    // --- FORM SUBMIT (DOWNLOAD) WITH AJAX ---
    document.getElementById('convertForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (allFiles.length === 0) {
            alert("Please select at least one image.");
            return;
        }

        const btn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status-container');
        
        btn.disabled = true;
        btn.innerText = "Processing...";
        statusDiv.style.display = "none";

        // Create FormData manually to include allFiles array
        const formData = new FormData(this);
        formData.delete('files'); // Remove default empty input
        allFiles.forEach(file => formData.append('files', file));

        try {
            const response = await fetch("{{ url_for('img_to_pdf_tool') }}", {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                // Get Filename
                const contentDisp = response.headers.get('Content-Disposition');
                let filename = 'Images_Converted.pdf';
                if (contentDisp && contentDisp.indexOf('filename=') !== -1) {
                    filename = contentDisp.split('filename=')[1].replace(/"/g, '');
                }
                
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                statusDiv.style.display = 'block';
                statusDiv.className = 'status-success';
                statusDiv.innerHTML = "✅ PDF Downloaded Successfully!";
            } else {
                throw new Error("Server error");
            }
        } catch (error) {
            console.error(error);
            statusDiv.style.display = 'block';
            statusDiv.className = 'status-error';
            statusDiv.innerHTML = "❌ Failed to create PDF.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Download";
        }
    });

    // --- PREVIEW LOGIC (FIXED) ---
    async function openPreview() {
        if (allFiles.length === 0) return;

        const modal = document.getElementById('preview-modal');
        const iframe = document.getElementById('pdf-preview-frame');
        const spinner = document.getElementById('loading-spinner');
        
        modal.style.display = 'flex';
        // Force iframe to be visible immediately
        iframe.style.opacity = '1'; 
        spinner.style.display = 'block';

        // Prepare Data
        const formData = new FormData(document.getElementById('convertForm'));
        formData.delete('files');
        allFiles.forEach(file => formData.append('files', file));
        formData.append('is_preview', 'true');

        try {
            const response = await fetch("{{ url_for('img_to_pdf_tool') }}", {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                
                // Explicitly set type to ensure browser knows it's a PDF
                const pdfBlob = new Blob([blob], { type: "application/pdf" });
                
                // FIX: Add #view=Fit to force browser PDF viewer to fit page
                const url = URL.createObjectURL(pdfBlob) + "#view=Fit";
                
                iframe.src = url;
                
                // Hide spinner immediately (do not wait for load event)
                spinner.style.display = 'none';
            } else {
                alert("Failed to generate preview.");
                closePreview();
            }
        } catch (e) {
            console.error(e);
            alert("Error loading preview.");
            closePreview();
        }
    }

    function closePreview() {
        document.getElementById('preview-modal').style.display = 'none';
        document.getElementById('pdf-preview-frame').src = 'about:blank';
    }

    // UI Logic for Options
    function setOrientation(element, value) {
        document.querySelectorAll('.radio-option').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        element.querySelector('input').checked = true;
    }

    function toggleOrientation(size) {
        const group = document.getElementById('orientation-group');
        if (size === 'original') {
            group.style.opacity = '0.5';
            group.style.pointerEvents = 'none';
        } else {
            group.style.opacity = '1';
            group.style.pointerEvents = 'all';
        }
    }
</script>
{% endblock %}
